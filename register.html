<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #262626, #b3001b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>


<div class="register-card">
    <h2 class="text-center mb-4 text-danger">Opera GX Registration Form</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Daulat, Enrico Jhayk O." required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Personal Number</label>
                <input type="text" class="form-control is-valid" value="0961 660 6255">
                <div class="valid-feedback fw-bold text-info">
                    Personal number verified successfully!
                </div>
            </div>
        </div>


        <div class="mb-3">
            <label class="form-label">Username Handle</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="OperaGX.username" required>
                <span class="input-group-text">@gmail.com</span>
            </div>
        </div>


        <div class="row mb-3">
            <div class="col-md-8">
                <label class="form-label">Specialization / Expertise</label>
                <select class="form-select" required>
                    <option value="" selected disabled>Choose Expertise...</option>
                    <option value="WEB">Web Development</option>
                    <option value="SSE"> Software & Systems Engineering</option>
                    <option value="DSAI">Data Science & Artificial Intelligence</option>
                    <option value="CDE">Cloud & DevOps Engineering</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label d-block">Gender</label>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" checked>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>


        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Retype password" required>
            </div>
        </div>


        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                I agree to give my information to Opera GX.
            </label><br>
             <a href="login.html" target="_blank">Already have an account? Login here.</a>
        </div>
       
        <button type="submit" class="btn btn-success w-100 py-2">Submit Registration</button>
    </form>
</div>


</body>
</html>
